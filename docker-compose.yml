services:
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_DATABASE: exam_system
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - exam-mysql-data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./exam-system-backend/src/main/resources/00-charset.sql:/docker-entrypoint-initdb.d/00-charset.sql:ro
      - ./exam-system-backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./exam-system-backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
      - ./exam-system-backend/src/main/resources/civil-service-skill-migration.sql:/docker-entrypoint-initdb.d/03-civil-service-skill-migration.sql:ro
      - ./exam-system-backend/src/main/resources/violation-migration.sql:/docker-entrypoint-initdb.d/04-violation-migration.sql:ro
      - ./exam-system-backend/src/main/resources/ai-knowledge-migration.sql:/docker-entrypoint-initdb.d/05-ai-knowledge-migration.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: exam-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./exam-system-backend
    container_name: exam-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/exam_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
      SPRING_PROFILES_ACTIVE: redis
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-exam-system-docker-jwt-secret-key-please-change-in-production}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./exam-system-web
    container_name: exam-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  exam-mysql-data:
